<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Api Request</title>
</head>
<body style="background-color: #212121;"> 

    <!--
    0 UNSENT: Request created but open() not called yet.

    1 OPENED: open() has been called; request initialized but not sent. Headers can be set here.

    2 HEADERS_RECEIVED: send() has been called, and response headers/status are available.

    3 LOADING: Response body is being received; responseText may have partial data.

    4 DONE: Operation complete; full response available or request failed. 
    -->

</body>
<script>
    const requestUrl = 'https://api.github.com/users/hiteshchoudhary'
    const  xhr = new XMLHttpRequest();
    xhr.open('GET',requestUrl)
    xhr.onreadystatechange = function(){
        console.log(xhr.readyState);
        if(xhr.readyState === 4){
            const data = JSON.parse(this.responseText)
            console.log(typeof data)
            console.log(data.followers);
             
        }
    }

    
    xhr.send()
</script>
</html>
